<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Tennis - Bird's Eye View</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas { border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
  #ui {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 24px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
    text-align: center;
  }
</style>
</head>
<body>
<div id="ui"><span id="playerScore">0</span> - <span id="aiScore">0</span></div>
<div id="message">Click to Start<br><small>Move mouse to control paddle</small></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 500;
const H = 700;
canvas.width = W;
canvas.height = H;

// Game state
const state = {
  running: false,
  playerScore: 0,
  aiScore: 0,
  maxScore: 7,
};

// Table dimensions
const TABLE = {
  x: 30, y: 30,
  w: W - 60, h: H - 60,
  color: '#1b6b3a',
  lineColor: '#fff',
  netY: H / 2,
};

// Paddles
const PADDLE_W = 70;
const PADDLE_H = 12;

const player = {
  x: W / 2 - PADDLE_W / 2,
  y: H - 60,
  w: PADDLE_W,
  h: PADDLE_H,
  color: '#e74c3c',
};

const ai = {
  x: W / 2 - PADDLE_W / 2,
  y: 48,
  w: PADDLE_W,
  h: PADDLE_H,
  color: '#3498db',
  speed: 3.5,
};

// Ball
const ball = {
  x: W / 2,
  y: H / 2,
  r: 8,
  dx: 0,
  dy: 0,
  speed: 5,
  color: '#f39c12',
  trail: [],
};

function resetBall(direction) {
  ball.x = W / 2;
  ball.y = H / 2;
  ball.trail = [];
  const angle = (Math.random() * 0.8 - 0.4); // slight random angle
  ball.dx = ball.speed * Math.sin(angle);
  ball.dy = ball.speed * direction; // +1 toward player, -1 toward AI
}

// Input
let mouseX = W / 2;
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});

canvas.addEventListener('click', () => {
  if (!state.running) {
    state.running = true;
    state.playerScore = 0;
    state.aiScore = 0;
    updateScoreboard();
    document.getElementById('message').textContent = '';
    resetBall(Math.random() < 0.5 ? 1 : -1);
  }
});

function updateScoreboard() {
  document.getElementById('playerScore').textContent = state.playerScore;
  document.getElementById('aiScore').textContent = state.aiScore;
}

// Drawing
function drawTable() {
  // Table surface
  ctx.fillStyle = TABLE.color;
  ctx.beginPath();
  ctx.roundRect(TABLE.x, TABLE.y, TABLE.w, TABLE.h, 6);
  ctx.fill();

  // Border
  ctx.strokeStyle = TABLE.lineColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(TABLE.x, TABLE.y, TABLE.w, TABLE.h, 6);
  ctx.stroke();

  // Center line (net)
  ctx.strokeStyle = TABLE.lineColor;
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(TABLE.x, TABLE.netY);
  ctx.lineTo(TABLE.x + TABLE.w, TABLE.netY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Net posts
  ctx.fillStyle = '#aaa';
  ctx.fillRect(TABLE.x - 4, TABLE.netY - 4, 8, 8);
  ctx.fillRect(TABLE.x + TABLE.w - 4, TABLE.netY - 4, 8, 8);

  // Center line vertical
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2, TABLE.y);
  ctx.lineTo(W / 2, TABLE.y + TABLE.h);
  ctx.stroke();
}

function drawPaddle(p) {
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.roundRect(p.x, p.y, p.w, p.h, 4);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(p.x + 4, p.y + 2, p.w - 8, p.h / 2 - 1, 2);
  ctx.fill();
}

function drawBall() {
  // Trail
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.3;
    ctx.fillStyle = `rgba(243, 156, 18, ${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * (i / ball.trail.length), 0, Math.PI * 2);
    ctx.fill();
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(ball.x + 3, ball.y + 3, ball.r, ball.r * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball
  ctx.fillStyle = ball.color;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(ball.x - 2, ball.y - 2, ball.r * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

// Collision
function rectBallCollision(paddle) {
  const closestX = Math.max(paddle.x, Math.min(ball.x, paddle.x + paddle.w));
  const closestY = Math.max(paddle.y, Math.min(ball.y, paddle.y + paddle.h));
  const distX = ball.x - closestX;
  const distY = ball.y - closestY;
  return (distX * distX + distY * distY) < (ball.r * ball.r);
}

function handlePaddleHit(paddle) {
  // Where on the paddle did it hit? -1 to 1
  const hitPos = ((ball.x - paddle.x) / paddle.w) * 2 - 1;
  const angle = hitPos * Math.PI / 3; // max 60 degree deflection
  const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
  const newSpeed = Math.min(speed * 1.05, 10); // slight speed increase, capped
  const dir = ball.dy > 0 ? -1 : 1; // reverse vertical direction
  ball.dx = newSpeed * Math.sin(angle);
  ball.dy = newSpeed * Math.cos(angle) * dir;
}

// Update
function update() {
  if (!state.running) return;

  // Player paddle follows mouse
  player.x = Math.max(TABLE.x, Math.min(mouseX - player.w / 2, TABLE.x + TABLE.w - player.w));

  // AI paddle
  const aiCenter = ai.x + ai.w / 2;
  const diff = ball.x - aiCenter;
  if (Math.abs(diff) > 4) {
    ai.x += Math.sign(diff) * Math.min(ai.speed, Math.abs(diff));
  }
  ai.x = Math.max(TABLE.x, Math.min(ai.x, TABLE.x + TABLE.w - ai.w));

  // Ball trail
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 8) ball.trail.shift();

  // Move ball
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounce (left/right)
  if (ball.x - ball.r < TABLE.x) {
    ball.x = TABLE.x + ball.r;
    ball.dx = Math.abs(ball.dx);
  }
  if (ball.x + ball.r > TABLE.x + TABLE.w) {
    ball.x = TABLE.x + TABLE.w - ball.r;
    ball.dx = -Math.abs(ball.dx);
  }

  // Paddle collisions
  if (rectBallCollision(player) && ball.dy > 0) {
    ball.y = player.y - ball.r;
    handlePaddleHit(player);
  }
  if (rectBallCollision(ai) && ball.dy < 0) {
    ball.y = ai.y + ai.h + ball.r;
    handlePaddleHit(ai);
  }

  // Scoring
  if (ball.y - ball.r > H) {
    state.aiScore++;
    updateScoreboard();
    checkWin() || resetBall(-1);
  }
  if (ball.y + ball.r < 0) {
    state.playerScore++;
    updateScoreboard();
    checkWin() || resetBall(1);
  }
}

function checkWin() {
  if (state.playerScore >= state.maxScore) {
    state.running = false;
    document.getElementById('message').innerHTML = 'You Win!<br><small>Click to play again</small>';
    return true;
  }
  if (state.aiScore >= state.maxScore) {
    state.running = false;
    document.getElementById('message').innerHTML = 'AI Wins!<br><small>Click to play again</small>';
    return true;
  }
  return false;
}

function draw() {
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  drawTable();
  drawPaddle(player);
  drawPaddle(ai);
  if (state.running) drawBall();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
